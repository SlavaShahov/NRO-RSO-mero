name: Build APK & IPA

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  android:
    name: Build Android APK
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: 'stable'
      - name: Dependencies
        working-directory: mobile_app
        run: flutter pub get
      - name: Build APK
        working-directory: mobile_app
        run: flutter build apk --release --no-tree-shake-icons
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: mobile_app/build/app/outputs/flutter-apk/app-release.apk
          retention-days: 30
      - name: GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: mobile_app/build/app/outputs/flutter-apk/app-release.apk
          name: "РСО Мероприятия ${{ github.ref_name }}"
          body: |
            ## Установка на Android
            1. Скачай app-release.apk
            2. Открой на телефоне → разреши установку из неизвестных источников

  ios:
    name: Build iOS
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: 'stable'
      - name: Dependencies
        working-directory: mobile_app
        run: flutter pub get
      - name: Build iOS
        working-directory: mobile_app
        run: flutter build ios --release --no-codesign --no-tree-shake-icons
      - name: Package IPA
        working-directory: mobile_app
        run: |
          mkdir -p build/ios/Payload
          cp -r build/ios/iphoneos/Runner.app build/ios/Payload/
          cd build/ios && zip -r rso-events.ipa Payload/
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-ipa
          path: mobile_app/build/ios/rso-events.ipa
          retention-days: 30
      - name: GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: mobile_app/build/ios/rso-events.ipa