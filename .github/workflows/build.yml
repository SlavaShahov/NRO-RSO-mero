name: Build APK & IPA

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  android:
    name: Android APK
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.27.4'
          channel: 'stable'
      - run: flutter pub get
        working-directory: mobile_app
      - run: flutter build apk --release --no-tree-shake-icons
        working-directory: mobile_app
      - uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: mobile_app/build/app/outputs/flutter-apk/app-release.apk
          retention-days: 30
      - name: GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: mobile_app/build/app/outputs/flutter-apk/app-release.apk
          name: "РСО Мероприятия ${{ github.ref_name }}"
          body: |
            ## Android
            1. Скачай `app-release.apk`
            2. Открой на телефоне → разреши установку из неизвестных источников

  ios:
    name: iOS IPA
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.27.4'
          channel: 'stable'
      - run: flutter pub get
        working-directory: mobile_app
      - name: Pod install
        working-directory: mobile_app/ios
        run: pod install --repo-update
      - name: Build iOS
        working-directory: mobile_app
        run: flutter build ios --release --no-codesign --no-tree-shake-icons
      - name: Package IPA
        working-directory: mobile_app
        run: |
          mkdir -p build/ios/Payload
          cp -r build/ios/iphoneos/Runner.app build/ios/Payload/
          cd build/ios && zip -r rso-events.ipa Payload/
      - uses: actions/upload-artifact@v4
        with:
          name: ios-ipa
          path: mobile_app/build/ios/rso-events.ipa
          retention-days: 30
      - name: GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: mobile_app/build/ios/rso-events.ipa
          body: |
            ## iOS — Sideloadly (бесплатно)
            1. Скачай rso-events.ipa
            2. Установи Sideloadly (sideloadly.io)
            3. Подключи iPhone, перетащи IPA