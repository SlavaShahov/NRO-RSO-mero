name: Build APK & IPA

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

# ВАЖНО: эти права нужны для создания GitHub Release
permissions:
  contents: write

jobs:
  # ── Android ────────────────────────────────────────────────────────────────
  android:
    name: Android APK
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.27.4'
          channel: 'stable'

      - name: Get dependencies
        working-directory: mobile_app
        run: flutter pub get

      - name: Build APK
        working-directory: mobile_app
        run: flutter build apk --release --no-tree-shake-icons

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: mobile_app/build/app/outputs/flutter-apk/app-release.apk
          retention-days: 30

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: mobile_app/build/app/outputs/flutter-apk/app-release.apk
          name: "РСО Мероприятия ${{ github.ref_name }}"
          body: |
            ## Android — установка
            1. Скачай `app-release.apk`
            2. Открой на телефоне
            3. Разреши установку из неизвестных источников → Установить

  # ── iOS ────────────────────────────────────────────────────────────────────
  ios:
    name: iOS IPA
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.27.4'
          channel: 'stable'

      - name: Get Flutter dependencies
        working-directory: mobile_app
        run: flutter pub get

      # Явно устанавливаем Pods перед билдом — это фиксит "Framework not found"
      - name: Install CocoaPods
        working-directory: mobile_app/ios
        run: |
          pod repo update
          pod install

      - name: Build iOS (no codesign)
        working-directory: mobile_app
        run: flutter build ios --release --no-codesign --no-tree-shake-icons

      - name: Package IPA
        working-directory: mobile_app
        run: |
          mkdir -p build/ios/Payload
          cp -r build/ios/iphoneos/Runner.app build/ios/Payload/
          cd build/ios && zip -r rso-events.ipa Payload/

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-ipa
          path: mobile_app/build/ios/rso-events.ipa
          retention-days: 30

      - name: Attach IPA to Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: mobile_app/build/ios/rso-events.ipa
          body: |
            ## iOS — установка через Sideloadly (бесплатно)
            1. Скачай `rso-events.ipa`
            2. Установи [Sideloadly](https://sideloadly.io)
            3. Подключи iPhone, открой Sideloadly, перетащи IPA